<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebPrestige — Dashboard Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:#0f0f14;color:#e4e4e7;min-height:100vh}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:#1a1a24;border-radius:16px;padding:48px;max-width:400px;width:100%;text-align:center;border:1px solid #2a2a3a}
    .login-box h1{font-size:28px;font-weight:800;color:#C0784A;margin-bottom:8px}
    .login-box p{color:#888;font-size:14px;margin-bottom:32px}
    .login-box input{width:100%;padding:14px 18px;border-radius:10px;border:1px solid #333;background:#12121a;color:#fff;font-size:15px;margin-bottom:16px;outline:none;transition:border-color .2s}
    .login-box input:focus{border-color:#C0784A}
    .login-box button{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#C0784A,#a0623a);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s}
    .login-box button:hover{transform:translateY(-1px);opacity:.9}
    .login-error{color:#ef4444;font-size:13px;margin-top:12px;display:none}
    .dashboard{display:none}
    .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:24px 32px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:22px;font-weight:700}
    .header h1 span{color:#C0784A}
    .header .refresh-btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:transparent;color:#999;cursor:pointer;font-size:13px;transition:all .2s}
    .header .refresh-btn:hover{border-color:#C0784A;color:#C0784A}
    .stats-bar{display:flex;gap:12px;padding:20px 32px;overflow-x:auto;border-bottom:1px solid #1e1e2a}
    .stat-card{background:#1a1a24;border-radius:12px;padding:16px 20px;min-width:130px;flex-shrink:0;border:1px solid #2a2a3a;transition:border-color .2s;cursor:pointer}
    .stat-card:hover{border-color:#C0784A}
    .stat-number{font-size:28px;font-weight:800;color:#fff}
    .stat-label{font-size:12px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    .filter-bar{padding:16px 32px;display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #333;background:transparent;color:#999;cursor:pointer;font-size:13px;transition:all .2s}
    .filter-btn:hover,.filter-btn.active{border-color:#C0784A;color:#C0784A;background:rgba(192,120,74,.1)}
    .prospects-grid{padding:0 32px 32px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
    .prospect-card{background:#1a1a24;border-radius:14px;border:1px solid #2a2a3a;overflow:hidden;transition:all .25s}
    .prospect-card:hover{border-color:#444;transform:translateY(-2px)}
    .card-header{padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .card-commerce{font-size:17px;font-weight:700;color:#fff}
    .card-secteur{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(192,120,74,.15);color:#C0784A;white-space:nowrap;font-weight:500}
    .card-info{padding:0 20px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:13px}
    .card-info .label{color:#666}
    .card-info .value{color:#ccc}
    .card-info a{color:#C0784A;text-decoration:none}
    .card-info a:hover{text-decoration:underline}
    .status-badge{display:inline-block;padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600}
    .status-nouveau{background:rgba(59,130,246,.15);color:#60a5fa}
    .status-contacte{background:rgba(168,85,247,.15);color:#c084fc}
    .status-rdv{background:rgba(234,179,8,.15);color:#fbbf24}
    .status-devis{background:rgba(249,115,22,.15);color:#fb923c}
    .status-signe{background:rgba(34,197,94,.15);color:#4ade80}
    .status-perdu{background:rgba(239,68,68,.15);color:#f87171}
    .card-sites{padding:14px 20px;border-top:1px solid #222;display:flex;gap:8px}
    .site-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;transition:all .2s;display:block}
    .site-btn.v0{background:#000;color:#fff;border:1px solid #333}
    .site-btn.v0:hover{border-color:#fff}
    .site-btn.claude{background:linear-gradient(135deg,#C0784A,#a0623a);color:#fff}
    .site-btn.claude:hover{opacity:.85}
    .site-btn.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
    .card-footer{padding:10px 20px 14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#555}
    .card-footer a{color:#666;text-decoration:none}
    .card-footer a:hover{color:#C0784A}
    .loading{display:flex;align-items:center;justify-content:center;padding:80px;flex-direction:column;gap:16px}
    .spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#C0784A;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:80px 32px;color:#666}
    .empty-state .emoji{font-size:48px;margin-bottom:16px}
    @media(max-width:768px){.stats-bar{padding:16px}.prospects-grid{padding:0 16px 16px;grid-template-columns:1fr}.header{padding:18px 16px}.filter-bar{padding:12px 16px}}
  </style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>WebPrestige</h1>
    <p>Dashboard Admin</p>
    <input type="password" id="loginKey" placeholder="Cl&eacute; d'acc&egrave;s" autocomplete="off">
    <button onclick="login()">Entrer</button>
    <div class="login-error" id="loginError">Cl&eacute; incorrecte.</div>
  </div>
</div>
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1><span>WebPrestige</span> — Dashboard</h1>
    <button class="refresh-btn" onclick="loadProspects()">Rafra&icirc;chir</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">Tous</button>
    <button class="filter-btn" data-filter="identifie">Identifi&eacute;s</button>
    <button class="filter-btn" data-filter="contacte">Contact&eacute;s</button>
    <button class="filter-btn" data-filter="formulaire_recu">Formulaire re&ccedil;u</button>
    <button class="filter-btn" data-filter="demo">D&eacute;mo</button>
    <button class="filter-btn" data-filter="rdv">RDV</button>
    <button class="filter-btn" data-filter="devis">Devis</button>
    <button class="filter-btn" data-filter="signe">Sign&eacute;s</button>
    <button class="filter-btn" data-filter="perdu">Perdus</button>
  </div>
  <div id="content"><div class="loading"><div class="spinner"></div><span style="color:#888;font-size:14px">Chargement...</span></div></div>
</div>
<script>
let allProspects=[],currentFilter='all',adminKey='';
const savedKey=localStorage.getItem('wp_admin_key');
if(savedKey){adminKey=savedKey;document.getElementById('loginScreen').style.display='none';document.getElementById('dashboard').style.display='block';loadProspects()}
function login(){const key=document.getElementById('loginKey').value.trim();if(!key)return;adminKey=key;
fetch('/api/prospects?key='+encodeURIComponent(key)).then(r=>{if(!r.ok)throw new Error('bad');return r.json()}).then(data=>{
localStorage.setItem('wp_admin_key',key);document.getElementById('loginScreen').style.display='none';document.getElementById('dashboard').style.display='block';renderAll(data)
}).catch(()=>{document.getElementById('loginError').style.display='block'})}
document.getElementById('loginKey').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
async function loadProspects(){document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><span style="color:#888">Chargement...</span></div>';
try{const r=await fetch('/api/prospects?key='+encodeURIComponent(adminKey));if(!r.ok)throw new Error();const data=await r.json();renderAll(data)}
catch(e){document.getElementById('content').innerHTML='<div class="empty-state"><div class="emoji">&#9888;&#65039;</div><p>Erreur de chargement.</p></div>'}}
function renderAll(data){allProspects=data.prospects;renderStats(data.stats);renderProspects()}
function renderStats(s){const items=[{k:'all',l:'Total',v:s.total,c:'#fff'},{k:'identifie',l:'Identifi\u00e9s',v:s.identifie,c:'#94a3b8'},{k:'contacte',l:'Contact\u00e9s',v:s.contacte,c:'#60a5fa'},{k:'formulaire_recu',l:'Formulaire',v:s.formulaire_recu,c:'#fbbf24'},{k:'demo',l:'D\u00e9mo',v:s.demo,c:'#c084fc'},{k:'rdv',l:'RDV',v:s.rdv,c:'#fb923c'},{k:'devis',l:'Devis',v:s.devis,c:'#f97316'},{k:'signe',l:'Sign\u00e9s',v:s.signe,c:'#4ade80'},{k:'perdu',l:'Perdus',v:s.perdu,c:'#f87171'}];
document.getElementById('statsBar').innerHTML=items.map(i=>`<div class="stat-card" onclick="setFilter('${i.k}')"><div class="stat-number" style="color:${i.c}">${i.v}</div><div class="stat-label">${i.l}</div></div>`).join('')}
function setFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));renderProspects()}
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>setFilter(b.dataset.filter)));
function renderProspects(){let f=allProspects;if(currentFilter!=='all'){const map={identifie:'Identifi\u00e9',contacte:'Contact\u00e9',formulaire_recu:'Formulaire re\u00e7u',demo:'D\u00e9mo envoy\u00e9e',rdv:'RDV fix\u00e9',devis:'Devis envoy\u00e9',signe:'Sign\u00e9',perdu:'Perdu'};const kw=map[currentFilter]||currentFilter;f=allProspects.filter(p=>p.statut===kw||(currentFilter==='perdu'&&p.statut==='Hors cible'))}
if(!f.length){document.getElementById('content').innerHTML='<div class="empty-state"><div class="emoji">&#128237;</div><p>Aucun prospect ici.</p></div>';return}
document.getElementById('content').innerHTML='<div class="prospects-grid">'+f.map(renderCard).join('')+'</div>'}
function renderCard(p){const sc=getStatusClass(p.statut);const date=p.date_contact?new Date(p.date_contact).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';
const v0Link=p.lien_demo&&!p.lien_demo.includes('/api/preview')?p.lien_demo:'';
const claudeLink=p.id?'/api/preview?id='+p.id:'';
return`<div class="prospect-card"><div class="card-header"><div><div class="card-commerce">${esc(p.commerce)}</div><span class="status-badge ${sc}">${esc(p.statut)}</span></div><span class="card-secteur">${esc(p.secteur)}</span></div>
<div class="card-info"><span class="label">G\u00e9rant</span><span class="value">${esc(p.prenom_gerant)||'\u2014'}</span><span class="label">Commune</span><span class="value">${esc(p.commune)}</span><span class="label">T\u00e9l</span><span class="value"><a href="tel:${p.telephone}">${esc(p.telephone)}</a></span><span class="label">Email</span><span class="value"><a href="mailto:${p.email}">${esc(p.email)||'\u2014'}</a></span>${p.budget?`<span class="label">Budget</span><span class="value">${esc(p.budget)}</span>`:''}</div>
<div class="card-sites"><a href="${v0Link||'#'}" target="_blank" class="site-btn v0 ${v0Link?'':'disabled'}">\u25B2 Preview v0</a><a href="${claudeLink||'#'}" target="_blank" class="site-btn claude ${claudeLink?'':'disabled'}">\uD83E\uDD16 Preview Claude</a></div>
<div class="card-footer"><span>${date}</span><a href="${p.notion_url}" target="_blank">Ouvrir Notion \u2192</a></div></div>`}
function getStatusClass(s){if(!s)return'';if(s==='Identifi\u00e9')return'status-nouveau';if(s==='Contact\u00e9'||s==='Formulaire envoy\u00e9')return'status-contacte';if(s==='Formulaire re\u00e7u')return'status-rdv';if(s==='D\u00e9mo envoy\u00e9e')return'status-devis';if(s==='RDV fix\u00e9')return'status-devis';if(s==='Devis envoy\u00e9')return'status-devis';if(s==='Sign\u00e9')return'status-signe';if(s==='Perdu'||s==='Hors cible')return'status-perdu';return''}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
</script>
</body>
</html>
